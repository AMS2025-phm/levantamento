<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamento das Medidas (Offline)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            border-radius: 1.5rem; /* rounded-3xl */
            padding: 2.5rem; /* p-10 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* shadow-xl */
            max-width: 800px;
            width: 100%;
        }
        /* Estilos para mensagens de status */
        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none; /* Hidden by default */
        }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .message.info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .pending-sync {
            background-color: #fff3cd !important; /* Amarelo claro para itens não sincronizados */
            border-left: 5px solid #ffc107; /* Borda lateral amarela */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Levantamento de Medidas</h1>

        <div id="message-display" class="message"></div>

        <form id="medidaForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group">
                    <label for="localidade" class="block text-sm font-medium text-gray-700">Localidade:</label>
                    <input type="text" id="localidade" name="localidade" placeholder="Ex: Escritório SP" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div class="form-group">
                    <label for="unidade" class="block text-sm font-medium text-gray-700">Unidade:</label>
                    <input type="text" id="unidade" name="unidade" placeholder="Ex: Sala 101" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group">
                    <label for="data_medicao" class="block text-sm font-medium text-gray-700">Data da Medição:</label>
                    <input type="date" id="data_medicao" name="data_medicao" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div class="form-group">
                    <label for="responsavel" class="block text-sm font-medium text-gray-700">Responsável:</label>
                    <input type="text" id="responsavel" name="responsavel" placeholder="Seu nome" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
            </div>

            <div class="form-group">
                <label for="email_destino" class="block text-sm font-medium text-gray-700">E-mail para envio:</label>
                <input type="email" id="email_destino" name="email_destino" placeholder="exemplo@dominio.com" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <hr>

            <h2 class="text-2xl font-semibold text-gray-700 mb-4 text-center">Adicionar Medidas</h2>
            <div id="medidasContainer" class="space-y-4">
                </div>
            <button type="button" id="addMedidaBtn"
                    class="w-full inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                + Adicionar Medida
            </button>

            <div class="action-buttons flex justify-center gap-4 mt-8">
                <button type="submit"
                        class="px-6 py-3 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Salvar Unidade
                </button>
                <button type="button" id="limparFormBtn"
                        class="px-6 py-3 border border-gray-300 rounded-md shadow-sm text-base font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Limpar Formulário
                </button>
            </div>
        </form>

        <hr>

        <h2 class="text-2xl font-semibold text-gray-700 mb-4 text-center">Unidades Salvas Localmente</h2>
        <div class="form-group">
            <label for="selectUnidadeSalva" class="block text-sm font-medium text-gray-700">Carregar Unidade Existente:</label>
            <select id="selectUnidadeSalva"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                <option value="">-- Selecione uma unidade --</option>
            </select>
        </div>
        <ul id="listaUnidadesSalvas" class="medida-list">
            </ul>
        <div class="flex justify-center gap-4 mt-4">
            <button type="button" id="carregarUnidadeBtn"
                    class="px-6 py-3 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500">
                Carregar para Edição
            </button>
            <button type="button" id="syncNowBtn"
                    class="px-6 py-3 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-yellow-600 hover:bg-yellow-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500">
                Sincronizar Agora
            </button>
        </div>
    </div>

    <script>
        const DB_NAME = 'levantamentoMedidasDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'unidades';

        let db;
        const tiposPiso = ["Paviflex", "Cerâmica", "Porcelanato", "Granilite", "Cimento Queimado", "Epoxi", "Ardósia", "Outros"];
        const tiposMedida = ["Vidro", "Sanitário-Vestiário", "Área Interna", "Área Externa"];
        const tiposParede = ["Alvenaria", "Estuque", "Divisórias"];

        const form = document.getElementById('medidaForm');
        const medidasContainer = document.getElementById('medidasContainer');
        const addMedidaBtn = document.getElementById('addMedidaBtn');
        const limparFormBtn = document.getElementById('limparFormBtn');
        const selectUnidadeSalva = document.getElementById('selectUnidadeSalva');
        const carregarUnidadeBtn = document.getElementById('carregarUnidadeBtn');
        const listaUnidadesSalvas = document.getElementById('listaUnidadesSalvas');
        const syncNowBtn = document.getElementById('syncNowBtn');
        const messageDisplay = document.getElementById('message-display');

        // --- Funções de IndexedDB ---
        function openDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const objectStore = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        objectStore.createIndex('local_unidade_index', ['localidade', 'unidade'], { unique: false });
                        objectStore.createIndex('synced_index', 'synced', { unique: false }); // Novo índice para 'synced'
                    }
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };

                request.onerror = (event) => {
                    console.error('Erro ao abrir IndexedDB:', event.target.error);
                    reject(event.target.error);
                };
            });
        }

        async function saveUnitToIndexedDB(unitData) {
            try {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                await store.put(unitData); // put() atualiza se a chave existe, adiciona se não
                await transaction.commit; // Certifica que a transação é concluída
                return unitData.id; // Retorna o ID da unidade salva/atualizada
            } catch (error) {
                console.error('Erro ao salvar unidade no IndexedDB:', error);
                throw error;
            }
        }

        async function getUnitsFromIndexedDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => resolve(request.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        async function getUnitsToSyncFromIndexedDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const index = store.index('synced_index');
                const request = index.getAll(IDBKeyRange.only(false)); // Buscar apenas unidades com synced: false

                request.onsuccess = () => resolve(request.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        async function markUnitAsSyncedInIndexedDB(unitId) {
            try {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const unit = await new Promise((resolve, reject) => {
                    const req = store.get(unitId);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = (event) => reject(event.target.error);
                });

                if (unit) {
                    unit.synced = true;
                    await store.put(unit);
                    await transaction.commit; // Certifica que a transação é concluída
                }
            } catch (error) {
                console.error(`Erro ao marcar unidade ${unitId} como sincronizada no IndexedDB:`, error);
                throw error;
            }
        }

        async function deleteUnitFromIndexedDB(unitId) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(unitId);

                request.onsuccess = () => resolve();
                request.onerror = (event) => reject(event.target.error);
            });
        }

        // --- Funções de UI/Formulário ---
        function showMessage(message, type = 'info') {
            messageDisplay.textContent = message;
            messageDisplay.className = `message ${type}`;
            messageDisplay.style.display = 'block';
            setTimeout(() => {
                messageDisplay.style.display = 'none';
            }, 5000); // Esconde a mensagem após 5 segundos
        }

        function createMedidaInputGroup(medida = {}) {
            const index = medidasContainer.children.length;
            const div = document.createElement('div');
            div.className = 'grid grid-cols-1 md:grid-cols-5 gap-4 items-end border p-4 rounded-md shadow-sm bg-gray-50';
            div.setAttribute('data-medida-index', index);

            div.innerHTML = `
                <div class="form-group col-span-1">
                    <label for="medida_m2_${index}" class="block text-sm font-medium text-gray-700">Medida (m²):</label>
                    <input type="number" step="0.01" id="medida_m2_${index}" name="medida_m2" placeholder="0.00" required
                           value="${medida.medida_m2 || ''}"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div class="form-group col-span-1">
                    <label for="tipo_medida_${index}" class="block text-sm font-medium text-gray-700">Tipo de Medida:</label>
                    <select id="tipo_medida_${index}" name="tipo_medida" required
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="">Selecione</option>
                        ${tiposMedida.map(tipo => `<option value="${tipo}" ${medida.tipo_medida === tipo ? 'selected' : ''}>${tipo}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group col-span-1">
                    <label for="tipo_piso_${index}" class="block text-sm font-medium text-gray-700">Tipo de Piso:</label>
                    <select id="tipo_piso_${index}" name="tipo_piso" required
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="">Selecione</option>
                        ${tiposPiso.map(tipo => `<option value="${tipo}" ${medida.tipo_piso === tipo ? 'selected' : ''}>${tipo}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group col-span-1">
                    <label for="tipo_parede_${index}" class="block text-sm font-medium text-gray-700">Tipo de Parede:</label>
                    <select id="tipo_parede_${index}" name="tipo_parede" required
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="">Selecione</option>
                        ${tiposParede.map(tipo => `<option value="${tipo}" ${medida.tipo_parede === tipo ? 'selected' : ''}>${tipo}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group col-span-1">
                    <label for="observacoes_${index}" class="block text-sm font-medium text-gray-700">Observações:</label>
                    <input type="text" id="observacoes_${index}" name="observacoes" placeholder="Opcional"
                           value="${medida.observacoes || ''}"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div class="col-span-full flex justify-end">
                    <button type="button" class="remove-medida-btn px-4 py-2 bg-red-500 text-white rounded-md hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">Remover</button>
                </div>
            `;
            medidasContainer.appendChild(div);

            div.querySelector('.remove-medida-btn').addEventListener('click', () => {
                div.remove();
                atualizarListaMedidas();
            });
        }

        function atualizarListaMedidas() {
            // Este é um placeholder, pois a lista de medidas do formulário não precisa ser 'atualizada' em si,
            // mas sim os grupos de input são adicionados/removidos.
            // Poderia ser usado para reindexar se necessário.
        }

        function clearForm() {
            form.reset();
            medidasContainer.innerHTML = '';
            createMedidaInputGroup(); // Adiciona um grupo vazio para começar
            // Opcional: Limpar a seleção da unidade salva
            selectUnidadeSalva.value = "";
            currentEditingUnitId = null; // Limpa o ID da unidade que está sendo editada
            showMessage('Formulário limpo.', 'info');
        }

        let currentEditingUnitId = null; // Para rastrear se estamos editando uma unidade salva

        async function carregarListaUnidadesSalvas() {
            selectUnidadeSalva.innerHTML = '<option value="">-- Selecione uma unidade --</option>';
            listaUnidadesSalvas.innerHTML = ''; // Limpa a lista de visualização
            const unidadesSalvas = await getUnitsFromIndexedDB();

            unidadesSalvas.forEach(unit => {
                const option = document.createElement('option');
                option.value = unit.id; // Usar o ID do IndexedDB como valor
                option.textContent = `${unit.localidade} - ${unit.unidade} (${unit.synced ? 'Sincronizado' : 'Pendente'})`;
                selectUnidadeSalva.appendChild(option);

                const li = document.createElement('li');
                li.textContent = `${unit.localidade} - ${unit.unidade} (${unit.synced ? 'Sincronizado' : 'Pendente'})`;
                li.className = `p-2 border-b last:border-b-0 cursor-pointer ${unit.synced ? '' : 'pending-sync'}`;
                li.dataset.unitId = unit.id;
                li.addEventListener('click', () => {
                    // Seleciona a opção correspondente no dropdown ao clicar na lista
                    selectUnidadeSalva.value = unit.id;
                });
                listaUnidadesSalvas.appendChild(li);
            });
        }

        // --- Detecção de Status de Rede ---
        async function checkOnlineStatus() {
            try {
                // Tenta fazer uma requisição HEAD para o backend para verificar a conectividade real
                // Use a URL completa do seu backend Render em produção!
                // Durante o desenvolvimento, pode ser 'http://localhost:5000/healthcheck'
                const response = await fetch('https://levantamento-medidas.onrender.com/healthcheck', { method: 'HEAD', cache: 'no-store' });
                return response.ok;
            } catch (error) {
                return false;
            }
        }

        // --- Lógica de Sincronização ---
        async function syncUnitsWithServer() {
            const isOnline = await checkOnlineStatus();
            if (!isOnline) {
                showMessage('Sem conexão com a internet. A sincronização será tentada automaticamente quando a conexão for restabelecida.', 'info');
                return;
            }

            showMessage('Iniciando sincronização...', 'info');
            syncNowBtn.disabled = true; // Desabilita o botão enquanto sincroniza

            try {
                const unitsToSync = await getUnitsToSyncFromIndexedDB();

                if (unitsToSync.length === 0) {
                    showMessage('Nenhuma unidade pendente de sincronização encontrada.', 'info');
                    return;
                }

                for (const unit of unitsToSync) {
                    try {
                        const backendData = {
                            localidade: unit.localidade,
                            unidade: unit.unidade,
                            data_medicao: unit.data_medicao,
                            responsavel: unit.responsavel,
                            email_destino: unit.email_destino,
                            medidas: unit.medidas
                        };

                        // Use a URL completa do seu backend Render em produção!
                        const response = await fetch('https://levantamento-medidas.onrender.com/salvar_unidade', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(backendData),
                        });

                        const result = await response.json();

                        if (response.ok) {
                            if (result.status === 'success' || result.status === 'warning') {
                                await markUnitAsSyncedInIndexedDB(unit.id);
                                showMessage(`Unidade '${unit.localidade} - ${unit.unidade}' sincronizada com sucesso! (Email: ${result.email_status})`, 'success');
                            } else {
                                throw new Error(result.message || 'Erro desconhecido no servidor.');
                            }
                        } else {
                            throw new Error(result.message || 'Erro ao enviar para o servidor.');
                        }

                    } catch (syncError) {
                        console.error(`Erro ao sincronizar unidade ${unit.id}:`, syncError);
                        showMessage(`Erro ao sincronizar '${unit.localidade} - ${unit.unidade}': ${syncError.message || 'Verifique o console.'}`, 'error');
                        // Continua a tentar sincronizar outras unidades mesmo se uma falhar
                    }
                }
                showMessage('Sincronização concluída. Verifique as mensagens para detalhes.', 'info');
            } catch (error) {
                console.error('Erro geral na sincronização:', error);
                showMessage('Erro geral na sincronização. Tente novamente mais tarde.', 'error');
            } finally {
                carregarListaUnidadesSalvas(); // Atualiza a lista após a tentativa de sincronização
                syncNowBtn.disabled = false; // Habilita o botão
            }
        }

        // --- Event Listeners ---
        addMedidaBtn.addEventListener('click', () => {
            createMedidaInputGroup();
        });

        limparFormBtn.addEventListener('click', clearForm);

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(form);
            const medidas = [];
            medidasContainer.querySelectorAll('[data-medida-index]').forEach(medidaDiv => {
                const m2 = medidaDiv.querySelector('[name="medida_m2"]').value;
                const tipoMedida = medidaDiv.querySelector('[name="tipo_medida"]').value;
                const tipoPiso = medidaDiv.querySelector('[name="tipo_piso"]').value;
                const tipoParede = medidaDiv.querySelector('[name="tipo_parede"]').value;
                const observacoes = medidaDiv.querySelector('[name="observacoes"]').value;

                if (m2 && tipoMedida && tipoPiso && tipoParede) { // Basic validation
                    medidas.push({
                        medida_m2: parseFloat(m2),
                        tipo_medida: tipoMedida,
                        tipo_piso: tipoPiso,
                        tipo_parede: tipoParede,
                        observacoes: observacoes
                    });
                }
            });

            if (medidas.length === 0) {
                showMessage('Adicione pelo menos uma medida.', 'error');
                return;
            }

            const unitData = {
                localidade: formData.get('localidade'),
                unidade: formData.get('unidade'),
                data_medicao: formData.get('data_medicao'),
                responsavel: formData.get('responsavel'),
                email_destino: formData.get('email_destino'),
                medidas: medidas,
                synced: false, // Nova propriedade para indicar que não está sincronizado
                timestamp: Date.now() // Adiciona um timestamp para ordenação ou controle
            };

            // Se estamos editando uma unidade existente, mantenha o ID
            if (currentEditingUnitId) {
                unitData.id = currentEditingUnitId;
            }

            try {
                const isOnline = await checkOnlineStatus();
                if (isOnline) {
                    // Tenta enviar para o backend imediatamente se online
                    const response = await fetch('https://levantamento-medidas.onrender.com/salvar_unidade', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(unitData),
                    });

                    const result = await response.json();

                    if (response.ok) {
                        if (result.status === 'success' || result.status === 'warning') {
                            unitData.synced = true; // Marca como sincronizado após sucesso no backend
                            await saveUnitToIndexedDB(unitData); // Salva no IndexedDB (ou atualiza)
                            showMessage(`Unidade salva no servidor e localmente. (Email: ${result.email_status})`, 'success');
                        } else {
                            // Se o servidor retornar erro, salva localmente como não sincronizado
                            unitData.synced = false;
                            await saveUnitToIndexedDB(unitData);
                            showMessage(`Unidade salva localmente devido a erro no servidor: ${result.message}`, 'warning');
                        }
                    } else {
                        // Se a requisição falhar (status != 2xx), salva localmente como não sincronizado
                        unitData.synced = false;
                        await saveUnitToIndexedDB(unitData);
                        showMessage(`Erro de rede ao salvar, unidade salva localmente: ${result.message || response.statusText}`, 'warning');
                    }
                } else {
                    // Se offline, apenas salva no IndexedDB
                    unitData.synced = false; // Garante que está marcado como não sincronizado
                    await saveUnitToIndexedDB(unitData);
                    showMessage('Você está offline. Unidade salva localmente e será sincronizada quando houver conexão.', 'info');
                }
                clearForm();
                carregarListaUnidadesSalvas();
            } catch (error) {
                console.error('Erro ao salvar ou sincronizar unidade:', error);
                showMessage(`Erro crítico: ${error.message}. Verifique o console.`, 'error');
            }
        });

        carregarUnidadeBtn.addEventListener('click', async () => {
            const selectedId = selectUnidadeSalva.value;
            if (selectedId) {
                const unidades = await getUnitsFromIndexedDB();
                const selectedUnit = unidades.find(unit => unit.id == selectedId); // Comparação solta, IndexedDB keys podem ser Number ou String

                if (selectedUnit) {
                    document.getElementById('localidade').value = selectedUnit.localidade;
                    document.getElementById('unidade').value = selectedUnit.unidade;
                    document.getElementById('data_medicao').value = selectedUnit.data_medicao;
                    document.getElementById('responsavel').value = selectedUnit.responsavel;
                    document.getElementById('email_destino').value = selectedUnit.email_destino;

                    medidasContainer.innerHTML = ''; // Limpa as medidas existentes
                    selectedUnit.medidas.forEach(medida => createMedidaInputGroup(medida));
                    currentEditingUnitId = selectedUnit.id; // Define o ID da unidade que está sendo editada
                    showMessage(`Unidade '${selectedUnit.localidade} - ${selectedUnit.unidade}' carregada para edição.`, 'success');
                }
            } else {
                showMessage('Selecione uma unidade para carregar.', 'warning');
            }
        });

        syncNowBtn.addEventListener('click', syncUnitsWithServer);

        // --- Inicialização ---
        document.addEventListener('DOMContentLoaded', async () => {
            await openDatabase();
            await carregarListaUnidadesSalvas();
            createMedidaInputGroup(); // Inicia com um campo de medida vazio

            // Registra o Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then(registration => {
                            console.log('Service Worker registrado com sucesso:', registration);
                            // Verifique se o Background Sync está disponível e registre-o
                            if ('SyncManager' in window) {
                                // Tenta registrar a sincronização em segundo plano, mas o acionamento principal
                                // ainda será no evento 'online' e no botão 'Sincronizar Agora'.
                                // O SyncManager é mais para garantia de que se a app for fechada,
                                // a sincronização pode acontecer quando a rede voltar.
                                registration.sync.register('sync-pending-units')
                                    .then(() => console.log('Background Sync registrado!'))
                                    .catch(err => console.error('Erro ao registrar Background Sync:', err));
                            }
                        })
                        .catch(error => {
                            console.error('Falha no registro do Service Worker:', error);
                        });
                });
            }

            // Detecta mudanças no status da rede
            window.addEventListener('online', () => {
                showMessage('Conexão com a internet restabelecida. Tentando sincronizar dados pendentes...', 'info');
                syncUnitsWithServer(); // Tenta sincronizar automaticamente
            });
            window.addEventListener('offline', () => {
                showMessage('Você está offline. Os dados serão salvos localmente e sincronizados quando a conexão for restabelecida.', 'warning');
            });

            // Verifica o status inicial da rede
            const isOnlineInitial = await checkOnlineStatus();
            if (!isOnlineInitial) {
                showMessage('Você está offline. Os dados serão salvos localmente.', 'warning');
            } else {
                // Tenta sincronizar ao carregar se estiver online e houver dados pendentes
                syncUnitsWithServer();
            }
        });
    </script>
</body>
</html>
