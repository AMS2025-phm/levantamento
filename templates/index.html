<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamento de Medidas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Levantamento de Medidas por Unidade</h1>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="localidade">Localidade:</label>
                <input type="text" id="localidade" name="localidade" required>
            </div>
            <div class="form-group">
                <label for="unidade">Unidade:</label>
                <input type="text" id="unidade" name="unidade" required>
            </div>
            <div class="form-group">
                <label for="data">Data:</label>
                <input type="date" id="data" name="data" value="{{ data_hoje }}" required>
            </div>
            <div class="form-group">
                <label for="responsavel">Responsavel pela unidade:</label>
                <input type="text" id="responsavel" name="responsavel">
            </div>
            <div class="form-group">
                <label for="qtd_func">Quantidade de Funcionário:</label>
                <input type="number" id="qtd_func" name="qtd_func" min="0">
            </div>

            <div class="form-group">
                <label>Tipo de Piso:</label>
                <div class="checkbox-group">
                    {% for tipo in tipos_piso %}
                    <label>
                        <input type="checkbox" name="piso" value="{{ tipo }}"> {{ tipo }}
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label>Paredes:</label>
                <div class="checkbox-group">
                    {% for tipo in tipos_parede %}
                    <label>
                        <input type="checkbox" name="paredes" value="{{ tipo }}"> {{ tipo }}
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label>Vidros Altos:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="vidros_altos" value="Sim"> Sim
                    </label>
                    <label>
                        <input type="radio" name="vidros_altos" value="Não" checked> Não
                    </label>
                </div>
            </div>
            
            <div class="form-group" id="risco_vidros_altos_group" style="display: none;">
                <label>Risco Associado aos Vidros Altos:</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="vidros_altos_risco" value="Sim"> Apresenta Risco/Perigo
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <div class="checkbox-group">
                    <label><input type="checkbox" name="estacionamento"> Estacionamento</label>
                    <label><input type="checkbox" name="gramado"> Gramado</label>
                    <label><input type="checkbox" name="curativo"> Sala de Curativo</label>
                    <label><input type="checkbox" name="vacina"> Sala de Vacina</label>
                </div>
            </div>

            <hr>
            <h2>Medidas por Área</h2>

            <div class="form-group">
                <label for="medida_tipo">Tipo de Medida:</label>
                <select id="medida_tipo" name="medida_tipo">
                    {% for tipo in tipos_medida %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="medida_altura">Altura (m):</label>
                <input type="number" id="medida_altura" name="medida_altura" step="0.01">
            </div>
            <div class="form-group">
                <label for="medida_largura">Largura (m):</label>
                <input type="number" id="medida_largura" name="medida_largura" step="0.01">
            </div>
            <div class="form-group">
                <label for="medida_qtd">Quantidade:</label>
                <input type="number" id="medida_qtd" name="medida_qtd" min="1" value="1">
            </div>
            
            <div class="button-group">
                <button type="button" class="btn" id="addMedidaBtn">Adicionar/Atualizar Medida</button>
                <button type="button" class="btn btn-secondary" id="removeMedidaBtn">Remover Medida</button>
            </div>
            
            <ul id="medidasList" class="medida-list">
                </ul>
        </form>

        <hr>
        <h2>Ações</h2>
        <div id="messageArea"></div>
        <div class="button-group main-actions">
            <button type="button" class="btn" id="saveBtn">Salvar Unidade</button>
            <button type="button" class="btn btn-secondary" id="clearBtn">Limpar Formulário</button>
            <button type="button" class="btn btn-success" id="exportBtn">Exportar e Enviar por E-mail</button>
        </div>
        
        <hr>
        <h2>Unidades Salvas</h2>
        <div class="form-group">
             <label for="localidade_unidade_salva">Carregar Unidade:</label>
             <select id="localidade_unidade_salva">
                 <option value="">-- Selecione uma unidade --</option>
             </select>
             <div class="button-group" style="margin-top: 10px;">
                <button type="button" class="btn" id="carregarUnidadeBtn">Carregar Dados</button>
                <button type="button" class="btn btn-danger" id="deletarUnidadeBtn">Deletar Unidade</button>
             </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cadastroForm = document.getElementById('cadastroForm');
            const localidadeInput = document.getElementById('localidade');
            const unidadeInput = document.getElementById('unidade');
            const dataInput = document.getElementById('data');
            const responsavelInput = document.getElementById('responsavel');
            const qtdFuncInput = document.getElementById('qtd_func');
            
            // NOVO: Variáveis para o checkbox de risco
            const vidrosAltosRadios = document.querySelectorAll('input[name="vidros_altos"]');
            const riscoVidrosAltosGroup = document.getElementById('risco_vidros_altos_group');
            const riscoVidrosAltosCheckbox = document.querySelector('input[name="vidros_altos_risco"]');

            const addMedidaBtn = document.getElementById('addMedidaBtn');
            const removeMedidaBtn = document.getElementById('removeMedidaBtn');
            const medidasList = document.getElementById('medidasList');

            const saveBtn = document.getElementById('saveBtn');
            const clearBtn = document.getElementById('clearBtn');
            const exportBtn = document.getElementById('exportBtn');
            const messageArea = document.getElementById('messageArea');

            const localidadeUnidadeSelect = document.getElementById('localidade_unidade_salva');
            const carregarUnidadeBtn = document.getElementById('carregarUnidadeBtn');
            const deletarUnidadeBtn = document.getElementById('deletarUnidadeBtn');
            
            let medidasData = [];
            let selectedMedidaIndex = null;
            
            function showMessage(message, type = 'success') {
                messageArea.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
                setTimeout(() => messageArea.innerHTML = '', 5000);
            }

           function atualizarListaMedidas() {
                medidasList.innerHTML = '';
                medidasData.forEach((medida, index) => {
                    const li = document.createElement('li');
                    li.textContent = `${medida.tipo} - Alt: ${medida.altura || 'N/A'}m, Larg: ${medida.largura || 'N/A'}m, Qtd: ${medida.qtd || 1}`;
                    li.dataset.index = index;
                    if (index === selectedMedidaIndex) {
                        li.classList.add('selected');
                    }
                    medidasList.appendChild(li);
                });
             }


            
            // NOVO: Event listener para mostrar/ocultar checkbox de risco
            vidrosAltosRadios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'Sim') {
                        riscoVidrosAltosGroup.style.display = 'block';
                    } else {
                        riscoVidrosAltosGroup.style.display = 'none';
                        riscoVidrosAltosCheckbox.checked = false; // Desmarca ao selecionar "Não"
                    }
                });
            });

            addMedidaBtn.addEventListener('click', () => {
                const medida = {
                    tipo: document.getElementById('medida_tipo').value,
                    altura: parseFloat(document.getElementById('medida_altura').value) || null,
                    largura: parseFloat(document.getElementById('medida_largura').value) || null,
                    qtd: parseInt(document.getElementById('medida_qtd').value, 10) || 1
                };

                if (!medida.tipo) {
                    showMessage('O tipo da medida é obrigatório.', 'error');
                    return;
                }
                
                if (selectedMedidaIndex !== null) {
                    medidasData[selectedMedidaIndex] = medida;
                    selectedMedidaIndex = null;
                } else {
                    medidasData.push(medida);
                }
                
                atualizarListaMedidas();
                document.getElementById('medida_tipo').value = 'Vidro';
                document.getElementById('medida_altura').value = '';
                document.getElementById('medida_largura').value = '';
                document.getElementById('medida_qtd').value = '1';
            });

            medidasList.addEventListener('click', (e) => {
                if (e.target.tagName === 'LI') {
                    const index = parseInt(e.target.dataset.index, 10);
                    if (selectedMedidaIndex === index) {
                         selectedMedidaIndex = null; // Desselecionar
                         document.getElementById('medida_tipo').value = 'Vidro';
                         document.getElementById('medida_altura').value = '';
                         document.getElementById('medida_largura').value = '';
                         document.getElementById('medida_qtd').value = '1';
                    } else {
                        selectedMedidaIndex = index;
                        const medida = medidasData[index];
                        document.getElementById('medida_tipo').value = medida.tipo;
                        document.getElementById('medida_altura').value = medida.altura;
                        document.getElementById('medida_largura').value = medida.largura;
                        document.getElementById('medida_qtd').value = medida.qtd;
                    }
                    atualizarListaMedidas();
                }
            });

            removeMedidaBtn.addEventListener('click', () => {
                if (selectedMedidaIndex !== null) {
                    medidasData.splice(selectedMedidaIndex, 1);
                    selectedMedidaIndex = null;
                    atualizarListaMedidas();
                } else {
                    showMessage('Selecione uma medida para remover.', 'error');
                }
            });

            function getFormData() {
                const formData = new FormData(cadastroForm);
                const data = Object.fromEntries(formData.entries());
                data.piso = formData.getAll('piso');
                data.paredes = formData.getAll('paredes');
                data.estacionamento = formData.has('estacionamento');
                data.gramado = formData.has('gramado');
                data.curativo = formData.has('curativo');
                data.vacina = formData.has('vacina');
                data.vidros_altos_risco = formData.has('vidros_altos_risco');
                data.medidas = medidasData;
                return data;
            }

            saveBtn.addEventListener('click', async () => {
                const data = getFormData();
                if (!data.localidade || !data.unidade) {
                    showMessage('Localidade e Unidade são obrigatórios.', 'error');
                    return;
                }
                
                const response = await fetch('/salvar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showMessage(result.message, result.status);
                if (result.status === 'success') {
                    carregarListaUnidadesSalvas();
                }
            });

            function clearForm() {
                cadastroForm.reset();
                document.getElementById('data').value = new Date().toISOString().slice(0, 10);
                document.querySelector('input[name="vidros_altos"][value="Não"]').checked = true;
                
                // NOVO: Resetar o estado do checkbox de risco
                riscoVidrosAltosGroup.style.display = 'none';
                riscoVidrosAltosCheckbox.checked = false;

                medidasData = [];
                selectedMedidaIndex = null;
                atualizarListaMedidas();
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                localidadeUnidadeSelect.value = ""; 
            }

            clearBtn.addEventListener('click', clearForm);

            exportBtn.addEventListener('click', async () => {
                const data = getFormData();
                if (!data.localidade || !data.unidade) {
                    showMessage('Preencha Localidade e Unidade para exportar.', 'error');
                    return;
                }
                
                showMessage('Exportando e enviando e-mail...', 'info');
                
                const response = await fetch('/exportar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                showMessage(result.message, result.status);
            });

            async function carregarListaUnidadesSalvas() {
                try {
                    const response = await fetch('/unidades');
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        const listaUnidades = await response.json();
                        
                        localidadeUnidadeSelect.innerHTML = '<option value="">-- Selecione uma unidade --</option>';
                        listaUnidades.forEach(item => {
                            const option = document.createElement('option');
                            option.value = item;
                            option.textContent = item;
                            localidadeUnidadeSelect.appendChild(option);
                        });
                    } else {
                        const rawText = await response.text();
                        console.error('Resposta inesperada do servidor (não é JSON):', rawText);
                        showMessage('Resposta inesperada do servidor ao carregar unidades. Formato inválido.', 'error');
                    }

                } catch (error) {
                    console.error('Erro ao recarregar lista de unidades:', error);
                    showMessage('Erro ao carregar lista de unidades salvas.', 'error');
                }
            }
            
            carregarUnidadeBtn.addEventListener('click', async () => {
                const [local, unit] = (localidadeUnidadeSelect.value || "").split('|');
                if (!local || !unit) {
                    showMessage('Por favor, selecione uma unidade para carregar.', 'error');
                    return;
                }

                const response = await fetch(`/carregar?localidade=${local}&unidade=${unit}`);
                const result = await response.json();

                if (result.status === 'success') {
                    clearForm();
                    const data = result.data;
                    localidadeInput.value = local;
                    unidadeInput.value = unit;
                    dataInput.value = data.data;
                    responsavelInput.value = data.responsavel || '';
                    qtdFuncInput.value = data.qtd_func || '';

                    document.querySelectorAll('input[name="piso"]').forEach(cb => cb.checked = (data.piso || []).includes(cb.value));
                    document.querySelectorAll('input[name="paredes"]').forEach(cb => cb.checked = (data.paredes || []).includes(cb.value));
                    
                    document.querySelector(`input[name="vidros_altos"][value="${data.vidros_altos || 'Não'}"]`).checked = true;

                    // NOVO: Lógica para carregar o estado do checkbox de risco
                    if (data.vidros_altos === 'Sim') {
                        riscoVidrosAltosGroup.style.display = 'block';
                        riscoVidrosAltosCheckbox.checked = data.vidros_altos_risco || false;
                    } else {
                        riscoVidrosAltosGroup.style.display = 'none';
                        riscoVidrosAltosCheckbox.checked = false;
                    }

                    document.querySelector('input[name="estacionamento"]').checked = data.estacionamento || false;
                    document.querySelector('input[name="gramado"]').checked = data.gramado || false;
                    document.querySelector('input[name="curativo"]').checked = data.curativo || false;
                    document.querySelector('input[name="vacina"]').checked = data.vacina || false;

                    medidasData = data.medidas || [];
                    atualizarListaMedidas();
                    
                    showMessage('Dados carregados com sucesso!', 'success');
                } else {
                    showMessage(result.message, 'error');
                }
            });

            deletarUnidadeBtn.addEventListener('click', async () => {
                 const [local, unit] = (localidadeUnidadeSelect.value || "").split('|');
                 if (!local || !unit) {
                    showMessage('Selecione uma unidade para deletar.', 'error');
                    return;
                 }
                 if (!confirm(`Tem certeza que deseja deletar a unidade ${unit} da localidade ${local}?`)) {
                     return;
                 }
                 
                 const response = await fetch('/deletar', {
                     method: 'POST',
                     headers: {'Content-Type': 'application/json'},
                     body: JSON.stringify({localidade: local, unidade: unit})
                 });
                 const result = await response.json();
                 showMessage(result.message, result.status);
                 if (result.status === 'success') {
                     carregarListaUnidadesSalvas();
                     clearForm();
                 }
            });

            // Inicializar a lista de unidades salvas ao carregar a página
            carregarListaUnidadesSalvas();
        });
    </script>
</body>
</html>
