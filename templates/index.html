<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Localidades e Medidas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Cadastro de Localidades e Medidas por Unidade</h1>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="localidade">Localidade:</label>
                <input type="text" id="localidade" name="localidade" required>
            </div>
            <div class="form-group">
                <label for="unidade">Unidade:</label>
                <input type="text" id="unidade" name="unidade" required>
            </div>
            <div class="form-group">
                <label for="data">Data:</label>
                <input type="date" id="data" name="data" value="{{ data_hoje }}" required>
            </div>
            <div class="form-group">
                <label for="responsavel">Responsavel pela unidade:</label>
                <input type="text" id="responsavel" name="responsavel">
            </div>
            <div class="form-group">
                <label for="qtd_func">Quantidade de Funcionário:</label>
                <input type="number" id="qtd_func" name="qtd_func">
            </div>
            <button type="submit" class="btn">Salvar Unidade</button>
        </form>

        <hr>

        <h2>Medidas por Unidade</h2>
        <div class="form-group">
            <label for="localidadeUnidade">Unidades Salvas:</label>
            <select id="localidadeUnidade">
                <option value="">-- Selecione uma unidade --</option>
                </select>
        </div>

        <form id="medidasForm" style="display: none;">
            <h3>Detalhes da Unidade Selecionada:</h3>
            <p><strong>Localidade:</strong> <span id="displayLocalidade"></span></p>
            <p><strong>Responsável:</strong> <span id="displayResponsavel"></span></p>
            <p><strong>Funcionários:</strong> <span id="displayQtdFunc"></span></p>
            <p><strong>Data de Cadastro:</strong> <span id="displayDataCadastro"></span></p>

            <h4>Adicionar Nova Medida</h4>
            <div class="form-group">
                <label for="tipo_medida">Tipo de Medida:</label>
                <select id="tipo_medida" name="tipo_medida" required>
                    <option value="">-- Selecione --</option>
                    {% for tipo in tipos_medida %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="metragem">Metragem (m²):</label>
                <input type="number" id="metragem" name="metragem" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="tipo_piso">Tipo de Piso:</label>
                <select id="tipo_piso" name="tipo_piso">
                    <option value="">-- Selecione --</option>
                    {% for tipo in tipos_piso %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="tipo_parede">Tipo de Parede:</label>
                <select id="tipo_parede" name="tipo_parede">
                    <option value="">-- Selecione --</option>
                    {% for tipo in tipos_parede %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="area_externa_coberta">Área Externa Coberta (m²):</label>
                <input type="number" id="area_externa_coberta" name="area_externa_coberta" step="0.01">
            </div>
            <div class="form-group">
                <label for="area_externa_descoberta">Área Externa Descoberta (m²):</label>
                <input type="number" id="area_externa_descoberta" name="area_externa_descoberta" step="0.01">
            </div>
            <div class="form-group">
                <label for="obs">Observações:</label>
                <textarea id="obs" name="obs" rows="3"></textarea>
            </div>
            <button type="button" class="btn" id="salvarMedidasBtn">Salvar Medida</button>
        </form>

        <ul id="medidaList" class="medida-list">
            </ul>
        <div class="button-group">
            <button type="button" class="btn btn-danger" id="excluirMedidaBtn" style="display: none;">Excluir Medida Selecionada</button>
            <button type="button" class="btn btn-danger" id="excluirUnidadeBtn" style="display: none;">Excluir Unidade Selecionada</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cadastroForm = document.getElementById('cadastroForm');
            const medidasForm = document.getElementById('medidasForm');
            const localidadeUnidadeSelect = document.getElementById('localidadeUnidade');
            const medidaList = document.getElementById('medidaList');
            const salvarMedidasBtn = document.getElementById('salvarMedidasBtn');
            const excluirMedidaBtn = document.getElementById('excluirMedidaBtn');
            const excluirUnidadeBtn = document.getElementById('excluirUnidadeBtn');

            let unidadeSelecionada = null; // Para controlar qual unidade está sendo exibida/editada
            let selectedMedidaIndex = -1; // Para controlar a medida selecionada para exclusão

            // Função para exibir mensagens (sucesso/erro)
            function showMessage(message, type) {
                const messageDiv = document.createElement('div');
                messageDiv.textContent = message;
                messageDiv.className = `message ${type}`;
                document.body.insertBefore(messageDiv, document.body.firstChild);
                setTimeout(() => messageDiv.remove(), 5000); // Remove a mensagem após 5 segundos
            }

            // --- Funções para o Formulário de Unidade ---
            cadastroForm.addEventListener('submit', async function(event) {
                event.preventDefault(); // Impede o envio padrão do formulário

                const formData = new FormData(cadastroForm);
                const data = {};
                formData.forEach((value, key) => {
                    data[key] = value;
                });

                try {
                    const response = await fetch('/salvar_unidade', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json' // <-- Linha corrigida
                        },
                        body: JSON.stringify(data) // <-- Linha corrigida
                    });

                    if (response.ok) {
                        const result = await response.json();
                        showMessage(result.message, 'success');
                        cadastroForm.reset(); // Limpa o formulário de unidade após o sucesso
                        // Certifica que a data_hoje seja inserida novamente se o campo for resetado
                        document.getElementById('data').value = "{{ data_hoje }}";
                        carregarListaUnidadesSalvas(); // Recarrega a lista de unidades salvas
                    } else {
                        const errorData = await response.json();
                        showMessage(errorData.message || 'Erro ao salvar unidade.', 'error');
                    }
                } catch (error) {
                    console.error('Erro de rede ou ao enviar requisição:', error);
                    showMessage('Erro de conexão ou ao enviar os dados da unidade.', 'error');
                }
            });

            // --- Funções para Carregar Unidades e Medidas ---
            async function carregarListaUnidadesSalvas() {
                try {
                    const response = await fetch('/carregar_unidades');
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        const listaUnidades = await response.json();
                        
                        localidadeUnidadeSelect.innerHTML = '<option value="">-- Selecione uma unidade --</option>';
                        listaUnidades.forEach(item => {
                            const option = document.createElement('option');
                            option.value = item;
                            option.textContent = item;
                            localidadeUnidadeSelect.appendChild(option);
                        });
                        // Tenta pré-selecionar a unidade se ela ainda estiver em unidadeSelecionada
                        if (unidadeSelecionada && listaUnidades.includes(unidadeSelecionada)) {
                            localidadeUnidadeSelect.value = unidadeSelecionada;
                            atualizarListaMedidas(); // Atualiza as medidas para a unidade pré-selecionada
                        } else {
                             // Reseta se a unidade selecionada não existe mais
                            unidadeSelecionada = null;
                            medidasForm.style.display = 'none';
                            medidaList.innerHTML = '';
                            excluirMedidaBtn.style.display = 'none';
                            excluirUnidadeBtn.style.display = 'none';
                        }
                    } else {
                        const rawText = await response.text();
                        console.error('Resposta inesperada do servidor (não é JSON):', rawText);
                        showMessage('Resposta inesperada do servidor ao carregar unidades. Formato inválido.', 'error');
                    }

                } catch (error) {
                    console.error('Erro ao recarregar lista de unidades:', error);
                    showMessage('Erro ao carregar lista de unidades salvas.', 'error');
                }
            }

            localidadeUnidadeSelect.addEventListener('change', function() {
                unidadeSelecionada = this.value;
                if (unidadeSelecionada) {
                    medidasForm.style.display = 'block';
                    excluirUnidadeBtn.style.display = 'block';
                    atualizarListaMedidas();
                } else {
                    medidasForm.style.display = 'none';
                    medidaList.innerHTML = ''; // Limpa a lista de medidas
                    excluirMedidaBtn.style.display = 'none';
                    excluirUnidadeBtn.style.display = 'none';
                }
            });

            async function atualizarListaMedidas() {
                if (!unidadeSelecionada) {
                    medidaList.innerHTML = '';
                    excluirMedidaBtn.style.display = 'none';
                    return;
                }

                try {
                    const response = await fetch(`/get_unidade_data/${unidadeSelecionada}`);
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        const unidadeData = await response.json();

                        // Preencher os detalhes da unidade
                        document.getElementById('displayLocalidade').textContent = unidadeData.localidade || 'N/A';
                        document.getElementById('displayResponsavel').textContent = unidadeData.responsavel || 'N/A';
                        document.getElementById('displayQtdFunc').textContent = unidadeData.qtd_func || 'N/A';
                        document.getElementById('displayDataCadastro').textContent = unidadeData.data_cadastro || 'N/A';

                        medidaList.innerHTML = ''; // Limpa a lista antes de adicionar
                        selectedMedidaIndex = -1; // Reseta a seleção da medida
                        excluirMedidaBtn.style.display = 'none'; // Esconde o botão de exclusão de medida

                        if (unidadeData.medidas && unidadeData.medidas.length > 0) {
                            unidadeData.medidas.forEach((medida, index) => {
                                const li = document.createElement('li');
                                let displayText = `Tipo: ${medida.tipo_medida}, Metragem: ${medida.metragem} m²`;
                                if (medida.tipo_piso) displayText += `, Piso: ${medida.tipo_piso}`;
                                if (medida.tipo_parede) displayText += `, Parede: ${medida.tipo_parede}`;
                                if (medida.area_externa_coberta) displayText += `, Área Cob.: ${medida.area_externa_coberta} m²`;
                                if (medida.area_externa_descoberta) displayText += `, Área Descob.: ${medida.area_externa_descoberta} m²`;
                                if (medida.obs) displayText += ` (Obs: ${medida.obs})`;

                                li.textContent = displayText;
                                li.dataset.index = index; // Armazena o índice para exclusão
                                li.addEventListener('click', function() {
                                    // Remove a classe 'selected' de todos os itens
                                    document.querySelectorAll('.medida-list li').forEach(item => {
                                        item.classList.remove('selected');
                                    });
                                    // Adiciona a classe 'selected' ao item clicado
                                    this.classList.add('selected');
                                    selectedMedidaIndex = parseInt(this.dataset.index);
                                    excluirMedidaBtn.style.display = 'inline-block'; // Mostra o botão de exclusão
                                });
                                medidaList.appendChild(li);
                            });
                        } else {
                            const li = document.createElement('li');
                            li.textContent = 'Nenhuma medida cadastrada para esta unidade.';
                            medidaList.appendChild(li);
                        }
                    } else {
                        const rawText = await response.text();
                        console.error('Resposta inesperada do servidor (não é JSON):', rawText);
                        showMessage('Resposta inesperada do servidor ao carregar dados da unidade. Formato inválido.', 'error');
                    }
                } catch (error) {
                    console.error('Erro ao carregar dados da unidade:', error);
                    showMessage('Erro ao carregar detalhes ou medidas da unidade.', 'error');
                }
            }

            // --- Funções para Salvar/Excluir Medidas e Unidades ---
            salvarMedidasBtn.addEventListener('click', async function() {
                if (!unidadeSelecionada) {
                    showMessage('Por favor, selecione uma unidade primeiro.', 'error');
                    return;
                }

                const medidaData = {
                    localidade: document.getElementById('displayLocalidade').textContent, // Pega a localidade exibida
                    unidade: unidadeSelecionada,
                    tipo_medida: document.getElementById('tipo_medida').value,
                    metragem: document.getElementById('metragem').value,
                    tipo_piso: document.getElementById('tipo_piso').value,
                    tipo_parede: document.getElementById('tipo_parede').value,
                    area_externa_coberta: document.getElementById('area_externa_coberta').value,
                    area_externa_descoberta: document.getElementById('area_externa_descoberta').value,
                    obs: document.getElementById('obs').value
                };

                if (!medidaData.tipo_medida || !medidaData.metragem) {
                    showMessage('Tipo de Medida e Metragem são obrigatórios para adicionar uma medida.', 'error');
                    return;
                }

                try {
                    const response = await fetch('/salvar_medidas', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json' // <-- Linha corrigida
                        },
                        body: JSON.stringify(medidaData) // <-- Linha corrigida
                    });

                    if (response.ok) {
                        const result = await response.json();
                        showMessage(result.message, 'success');
                        medidasForm.reset(); // Limpa o formulário de medidas
                        atualizarListaMedidas(); // Recarrega as medidas para a unidade atual
                    } else {
                        const errorData = await response.json();
                        showMessage(errorData.message || 'Erro ao salvar medida.', 'error');
                    }
                } catch (error) {
                    console.error('Erro de rede ou ao enviar requisição de medida:', error);
                    showMessage('Erro de conexão ou ao salvar a medida.', 'error');
                }
            });

            excluirMedidaBtn.addEventListener('click', async function() {
                if (unidadeSelecionada && selectedMedidaIndex !== -1) {
                    const localidade = document.getElementById('displayLocalidade').textContent;

                    try {
                        const response = await fetch('/excluir_medida', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json' // <-- Linha corrigida
                            },
                            body: JSON.stringify({
                                localidade: localidade,
                                unidade: unidadeSelecionada,
                                index: selectedMedidaIndex
                            })
                        });

                        if (response.ok) {
                            const result = await response.json();
                            showMessage(result.message, 'success');
                            selectedMedidaIndex = -1; // Reseta a seleção
                            excluirMedidaBtn.style.display = 'none'; // Esconde o botão
                            atualizarListaMedidas(); // Recarrega as medidas
                        } else {
                            const errorData = await response.json();
                            showMessage(errorData.message || 'Erro ao excluir medida.', 'error');
                        }
                    } catch (error) {
                        console.error('Erro de rede ou ao excluir medida:', error);
                        showMessage('Erro de conexão ou ao excluir a medida.', 'error');
                    }
                } else {
                    showMessage('Nenhuma medida selecionada para exclusão.', 'error');
                }
            });

            excluirUnidadeBtn.addEventListener('click', async function() {
                if (!unidadeSelecionada) {
                    showMessage('Nenhuma unidade selecionada para exclusão.', 'error');
                    return;
                }

                const localidade = document.getElementById('displayLocalidade').textContent; // Pega a localidade exibida

                try {
                    const response = await fetch('/excluir_unidade', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json' // <-- Linha corrigida
                        },
                        body: JSON.stringify({
                            localidade: localidade,
                            unidade: unidadeSelecionada
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        showMessage(result.message, 'success');
                        unidadeSelecionada = null; // Reseta a unidade selecionada
                        medidasForm.style.display = 'none'; // Esconde o formulário de medidas
                        medidaList.innerHTML = ''; // Limpa a lista de medidas
                        excluirUnidadeBtn.style.display = 'none'; // Esconde o botão de excluir unidade
                        excluirMedidaBtn.style.display = 'none'; // Esconde o botão de excluir medida (se visível)
                        carregarListaUnidadesSalvas(); // Recarrega a lista de unidades salvas no dropdown
                    } else {
                        const errorData = await response.json();
                        showMessage(errorData.message || 'Erro ao excluir unidade.', 'error');
                    }
                } catch (error) {
                    console.error('Erro de rede ou ao excluir unidade:', error);
                    showMessage('Erro de conexão ou ao excluir a unidade.', 'error');
                }
            });

            // Inicializar a lista de unidades salvas ao carregar a página
            carregarListaUnidadesSalvas();
        });
    </script>
</body>
</html>
